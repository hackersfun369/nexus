name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  web:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build web UI
        run: cd web && pnpm install && pnpm build

      - name: Upload static assets
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: internal/web/static/
          retention-days: 1

  build:
    name: Build (${{ matrix.suffix }})
    needs: web
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Download Go modules
        run: go mod download

      - name: Download web static assets
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: /tmp/web-static

      - name: Copy web static assets
        run: |
          mkdir -p internal/web/static
          cp -r /tmp/web-static/. internal/web/static/

      - name: Debug workspace
        run: |
          echo "=== workspace ==="
          ls -la
          echo "=== cmd ==="
          ls -la cmd/ || echo "no cmd dir"
          echo "=== cmd/nexus ==="
          ls -la cmd/nexus/ || echo "no cmd/nexus dir"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X github.com/hackersfun369/nexus/internal/version.Version=${VERSION} -X github.com/hackersfun369/nexus/internal/version.Commit=${COMMIT} -X github.com/hackersfun369/nexus/internal/version.BuildDate=${DATE}"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o dist/nexus-${{ matrix.suffix }}${{ matrix.ext }} ./cmd/nexus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-${{ matrix.suffix }}
          path: dist/nexus-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum nexus-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NEXUS ${{ github.ref_name }}
          body: |
            ## NEXUS ${{ github.ref_name }}

            ### Install

            **Linux / macOS / WSL:**

                curl -fsSL https://raw.githubusercontent.com/hackersfun369/nexus/main/install.sh | sh

            **Manual download:** Pick the binary for your platform below.

            ### Platforms
            | Binary | OS | Arch |
            |--------|-----|------|
            | nexus-linux-amd64 | Linux | x86_64 |
            | nexus-linux-arm64 | Linux | ARM64 |
            | nexus-darwin-amd64 | macOS | Intel |
            | nexus-darwin-arm64 | macOS | Apple Silicon |
            | nexus-windows-amd64.exe | Windows | x86_64 |

            ### Whats in this release
            - Code generator: 6 platforms, 40+ templates
            - 33 quality rules
            - Plugin system (8 official plugins)
            - Web UI with syntax highlighting
            - Terminal chat REPL
            - Project persistence
          files: |
            dist/nexus-*
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
