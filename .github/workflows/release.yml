name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  GO_VERSION: "1.23"
  CGO_ENABLED: 1
  BINARY_NAME: nexus

jobs:
  build-matrix:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            cc: gcc
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            cc: aarch64-linux-gnu-gcc
          - os: darwin
            arch: amd64
            runner: macos-latest
            cc: gcc
          - os: darwin
            arch: arm64
            runner: macos-latest
            cc: gcc
          - os: windows
            arch: amd64
            runner: windows-latest
            cc: gcc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc libsqlite3-dev
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install dependencies (macOS)
        if: matrix.os == 'darwin'
        run: brew install sqlite3

      - name: Set binary name
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            echo "BINARY=${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}.exe" >> $GITHUB_ENV
          else
            echo "BINARY=${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}" >> $GITHUB_ENV
          fi

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CC: ${{ matrix.cc }}
        run: |
          CGO_ENABLED=1 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" \
            -o dist/${{ env.BINARY }} \
            ./cmd/nexus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/${{ env.BINARY }}
          retention-days: 7

  release:
    name: Create Release
    needs: build-matrix
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
