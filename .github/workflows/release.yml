name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  web:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build web UI
        run: cd web && pnpm install && pnpm build

      - name: Upload static assets
        uses: actions/upload-artifact@v4
        with:
          name: web-static
          path: internal/web/static/
          retention-days: 1

  build-linux:
    name: Build Linux
    needs: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Install cross-compile tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc gcc-aarch64-linux-gnu libsqlite3-dev

      - name: Download web static assets
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: /tmp/web-static

      - name: Copy web static assets
        run: mkdir -p internal/web/static && cp -r /tmp/web-static/. internal/web/static/

      - name: Download Go modules
        run: go mod download

      - name: Build linux-amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
          CC: gcc
        run: |
          LDFLAGS="-s -w -X github.com/hackersfun369/nexus/internal/version.Version=${GITHUB_REF_NAME} -X github.com/hackersfun369/nexus/internal/version.Commit=$(git rev-parse --short HEAD) -X github.com/hackersfun369/nexus/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o dist/nexus-linux-amd64 ./cmd/nexus

      - name: Build linux-arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
        run: |
          LDFLAGS="-s -w -X github.com/hackersfun369/nexus/internal/version.Version=${GITHUB_REF_NAME} -X github.com/hackersfun369/nexus/internal/version.Commit=$(git rev-parse --short HEAD) -X github.com/hackersfun369/nexus/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "${LDFLAGS}" -o dist/nexus-linux-arm64 ./cmd/nexus

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-linux
          path: dist/

  build-macos:
    name: Build macOS
    needs: web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Download web static assets
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: /tmp/web-static

      - name: Copy web static assets
        run: mkdir -p internal/web/static && cp -r /tmp/web-static/. internal/web/static/

      - name: Download Go modules
        run: go mod download

      - name: Build darwin-amd64
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          LDFLAGS="-s -w -X github.com/hackersfun369/nexus/internal/version.Version=${GITHUB_REF_NAME} -X github.com/hackersfun369/nexus/internal/version.Commit=$(git rev-parse --short HEAD) -X github.com/hackersfun369/nexus/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          go build -ldflags "${LDFLAGS}" -o dist/nexus-darwin-amd64 ./cmd/nexus

      - name: Build darwin-arm64
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 1
        run: |
          LDFLAGS="-s -w -X github.com/hackersfun369/nexus/internal/version.Version=${GITHUB_REF_NAME} -X github.com/hackersfun369/nexus/internal/version.Commit=$(git rev-parse --short HEAD) -X github.com/hackersfun369/nexus/internal/version.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "${LDFLAGS}" -o dist/nexus-darwin-arm64 ./cmd/nexus

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-macos
          path: dist/

  build-windows:
    name: Build Windows
    needs: web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Download web static assets
        uses: actions/download-artifact@v4
        with:
          name: web-static
          path: C:\tmp\web-static

      - name: Copy web static assets
        run: |
          New-Item -ItemType Directory -Force -Path internal\web\static
          Copy-Item -Recurse -Force "C:\tmp\web-static\*" internal\web\static\
        shell: pwsh

      - name: Download Go modules
        run: go mod download

      - name: Install gcc for Windows
        run: choco install mingw -y
        shell: pwsh

      - name: Build windows-amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $COMMIT = git rev-parse --short HEAD
          $DATE = (Get-Date -UFormat "%Y-%m-%dT%H:%M:%SZ")
          $LDFLAGS = "-s -w -X github.com/hackersfun369/nexus/internal/version.Version=$VERSION -X github.com/hackersfun369/nexus/internal/version.Commit=$COMMIT -X github.com/hackersfun369/nexus/internal/version.BuildDate=$DATE"
          New-Item -ItemType Directory -Force -Path dist
          go build -ldflags $LDFLAGS -o dist\nexus-windows-amd64.exe .\cmd\nexus
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-windows
          path: dist/

  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum nexus-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: NEXUS ${{ github.ref_name }}
          body: |
            ## NEXUS ${{ github.ref_name }}

            ### Install

            **Linux / macOS / WSL:**

                curl -fsSL https://raw.githubusercontent.com/hackersfun369/nexus/main/install.sh | sh

            **Manual download:** Pick the binary for your platform below.

            ### Platforms
            | Binary | OS | Arch |
            |--------|-----|------|
            | nexus-linux-amd64 | Linux | x86_64 |
            | nexus-linux-arm64 | Linux | ARM64 |
            | nexus-darwin-amd64 | macOS | Intel |
            | nexus-darwin-arm64 | macOS | Apple Silicon |
            | nexus-windows-amd64.exe | Windows | x86_64 |

            ### Whats in this release
            - Code generator: 6 platforms, 40+ templates
            - 33 quality rules · Plugin system · Web UI
            - Terminal chat REPL · Project persistence
          files: |
            dist/nexus-*
            dist/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
